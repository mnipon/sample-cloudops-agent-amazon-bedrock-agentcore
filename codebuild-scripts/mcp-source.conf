# Upstream MCP source — single source of truth for all patch-*.sh build scripts.
#
# The Billing, Pricing, CloudWatch, and CloudTrail MCP server images are built
# by cloning the public AWS Labs MCP repository and patching it for
# streamable-HTTP transport. The external repository URL is centralized here so
# it lives in ONE reviewable place rather than being duplicated across the four
# patch scripts. To point the build at a fork or mirror, change only this file.
MCP_REPO_URL="https://github.com/awslabs/mcp.git"
